<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | El Le3ba - The Game</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
  
    <link rel='manifest' href='manifest.webmanifest'>
    <meta name='theme-color' content='#ff007f'>
    <meta name='apple-mobile-web-app-capable' content='yes'>
    <meta name='apple-mobile-web-app-status-bar-style' content='black-translucent'>
    <link rel='apple-touch-icon' href='TemplateData/unity-logo-light.png'>
    <style>
        #pwa-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: sans-serif; text-align: center; padding: 20px; box-sizing: border-box; }
        .pwa-content { max-width: 400px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 60px rgba(0,0,0,0.8); }
        .pwa-title { font-size: 32px; font-weight: 800; margin-bottom: 12px; background: linear-gradient(135deg, #8a2be2, #ff007f, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #pwa-install-btn { background: linear-gradient(135deg, #8a2be2, #ff007f); color: white; border: none; padding: 18px 32px; font-size: 18px; font-weight: 700; border-radius: 16px; cursor: pointer; width: 100%; text-transform: uppercase; }
        #pwa-ios-instructions { display: none; margin-top: 20px; font-size: 15px; background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 16px; border: 1px dashed rgba(255, 255, 255, 0.2); }
    </style></head>
  <body>
    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">El Le3ba - The Game</div>
      </div>
    </div>
    <script>

      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      // Shows a temporary message banner/ribbon for a few seconds, or
      // a permanent error message on top of the canvas if type=='error'.
      // If type=='warning', a yellow highlight color is used.
      // Modify or remove this function to customize the visually presented
      // way that non-critical warnings and error messages are presented to the
      // user.
      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Build.loader.js";
      var config = {
        dataUrl: buildUrl + "/Build.data",
        frameworkUrl: buildUrl + "/Build.framework.js",
        codeUrl: buildUrl + "/Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "logic",
        productName: "El Le3ba - The Game",
        productVersion: "1.3",
        showBanner: unityShowBanner,
      };

      // By default, Unity keeps WebGL canvas render target size matched with
      // the DOM size of the canvas element (scaled by window.devicePixelRatio)
      // Set this to false if you want to decouple this synchronization from
      // happening inside the engine, and you would instead like to size up
      // the canvas DOM size and WebGL render target sizes yourself.
      // config.matchWebGLToCanvasSize = false;

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        // Mobile device style: fill the whole browser client area with the game canvas:

        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";

        // To lower canvas resolution on mobile devices to gain some
        // performance, uncomment the following line:
        // config.devicePixelRatio = 1;


      } else {
        // Desktop style: Render the game canvas in a window that can be maximized to fullscreen:

        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                loadingBar.style.display = "none";
                fullscreenButton.onclick = () => {
                  document.makeFullscreen('unity-container');
                };
              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  
    <div id='pwa-overlay'>
      <div class='pwa-content'>
        <div class='pwa-title'>El Le3ba</div>
        <button id='pwa-install-btn'>Add To Home Screen</button>
        <div id='pwa-ios-instructions'>1. Tap Share<br>2. Select Add to Home Screen</div>
        <div id='pwa-skip' style='margin-top:20px; cursor:pointer; color:gray;'>Continue in Browser</div>
      </div>
    </div>
    <script>
      let defPrompt;
      const overlay = document.getElementById('pwa-overlay');
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) overlay.style.display = 'none';
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
      window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); defPrompt = e; });
      document.getElementById('pwa-install-btn').addEventListener('click', async () => {
        if (defPrompt) { defPrompt.prompt(); overlay.style.display = 'none'; }
        else { document.getElementById('pwa-ios-instructions').style.display = 'block'; }
      });
      document.getElementById('pwa-skip').addEventListener('click', () => overlay.style.display = 'none');
    </script></body>
</html>
