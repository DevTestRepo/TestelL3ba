<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | El Le3ba - The Game</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="manifest" href="manifest.webmanifest">
    <meta name="theme-color" content="#ff007f">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="El Le3ba - The Game">
    <link rel="apple-touch-icon" href="TemplateData/unity-logo-light.png">
    <style>
      #pwa-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
        z-index: 9999;
        display: none; /* Hidden by default */
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: white;
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        text-align: center;
        padding: 20px;
        box-sizing: border-box;
      }
      .pwa-content {
        max-width: 400px;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        padding: 40px;
        border-radius: 30px;
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 25px 60px rgba(0,0,0,0.8);
      }
      .pwa-icon {
        width: 120px;
        height: 120px;
        border-radius: 28px;
        margin-bottom: 24px;
        box-shadow: 0 10px 30px rgba(255, 0, 127, 0.3);
      }
      .pwa-title {
        font-size: 32px;
        font-weight: 800;
        margin-bottom: 12px;
        background: linear-gradient(135deg, #8a2be2, #ff007f, #ff8c00);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -1px;
      }
      .pwa-desc {
        font-size: 16px;
        color: #ddd;
        margin-bottom: 32px;
        line-height: 1.6;
      }
      #pwa-install-btn {
        background: linear-gradient(135deg, #8a2be2, #ff007f);
        color: white;
        border: none;
        padding: 18px 32px;
        font-size: 18px;
        font-weight: 700;
        border-radius: 16px;
        cursor: pointer;
        transition: transform 0.2s, box-shadow 0.2s, filter 0.2s;
        width: 100%;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #pwa-install-btn:hover {
        filter: brightness(1.1);
        box-shadow: 0 10px 20px rgba(255, 0, 127, 0.4);
      }
      #pwa-install-btn:active {
        transform: scale(0.97);
      }
      #pwa-ios-instructions {
        display: none;
        margin-top: 20px;
        font-size: 15px;
        background: rgba(255, 255, 255, 0.05);
        padding: 20px;
        border-radius: 16px;
        border: 1px dashed rgba(255, 255, 255, 0.2);
        animation: fadeIn 0.5s ease-out;
      }
      @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
      .ios-icon {
        display: inline-block;
        width: 24px;
        vertical-align: middle;
        margin: 0 6px;
        background: #fff;
        padding: 2px;
        border-radius: 4px;
      }
      #pwa-skip {
        margin-top: 28px;
        color: rgba(255,255,255,0.4);
        text-decoration: none;
        font-size: 14px;
        cursor: pointer;
        transition: color 0.2s;
      }
      #pwa-skip:hover {
        color: white;
      }
    </style>
  
    <link rel='manifest' href='manifest.webmanifest'>
    <meta name='theme-color' content='#ff007f'>
    <meta name='apple-mobile-web-app-capable' content='yes'>
    <meta name='apple-mobile-web-app-status-bar-style' content='black-translucent'>
    <link rel='apple-touch-icon' href='TemplateData/unity-logo-light.png'>
    <style>
        #pwa-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: white; font-family: sans-serif; text-align: center; padding: 20px; box-sizing: border-box; }
        .pwa-content { max-width: 400px; background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); padding: 40px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 60px rgba(0,0,0,0.8); }
        .pwa-title { font-size: 32px; font-weight: 800; margin-bottom: 12px; background: linear-gradient(135deg, #8a2be2, #ff007f, #ff8c00); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        #pwa-install-btn { background: linear-gradient(135deg, #8a2be2, #ff007f); color: white; border: none; padding: 18px 32px; font-size: 18px; font-weight: 700; border-radius: 16px; cursor: pointer; width: 100%; text-transform: uppercase; }
        #pwa-ios-instructions { display: none; margin-top: 20px; font-size: 15px; background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 16px; border: 1px dashed rgba(255, 255, 255, 0.2); }
    </style></head>
  <body>
    <div id="pwa-overlay">
      <div class="pwa-content">
        <img src="TemplateData/unity-logo-light.png" alt="App Icon" class="pwa-icon">
        <div class="pwa-title">El Le3ba - The Game</div>
        <div class="pwa-desc" id="pwa-status">Install on your home screen for the full mobile experience.</div>
        
        <button id="pwa-install-btn" onclick="handleInstall()">Add To Home Screen</button>
        
        <div id="pwa-ios-instructions">
          1. Tap <svg class="ios-icon" viewBox="0 0 50 50" fill="#007aff"><path d="M30.3,13.7L25,8.4l-5.3,5.3l-1.4-1.4L25,5.6l6.7,6.7L30.3,13.7z M24,30.3V8.4h2v21.9H24z M15,45h20c2.8,0,5-2.2,5-5V20 c0-2.8-2.2-5-5-5h-5v2h5c1.7,0,3,1.3,3,3v20c0,1.7-1.3,3-3,3H15c-1.7,0-3-1.3-3-3V20c0-1.7,1.3-3,3-3h5v-2h-5c-2.8,0-5,2.2-5,5v20 C10,42.8,12.2,45,15,45z"/></svg> <b>Share</b><br>
          2. Select <b>Add to Home Screen</b>
        </div>

        <div id="pwa-skip" onclick="hidePWA()">Continue in Browser</div>
      </div>
    </div>

    <script>
      let deferredPrompt;
      const overlay = document.getElementById('pwa-overlay');
      const installBtn = document.getElementById('pwa-install-btn');
      const iosInstructions = document.getElementById('pwa-ios-instructions');
      const pwaStatus = document.getElementById('pwa-status');

      function checkStandalone() {
        return window.matchMedia('(display-mode: standalone)').matches || 
               window.navigator.standalone === true ||
               document.referrer.includes('android-app://');
      }

      function hidePWA() {
        overlay.style.display = 'none';
      }

      async function handleInstall() {
        if (deferredPrompt) {
          deferredPrompt.prompt();
          const { outcome } = await deferredPrompt.userChoice;
          if (outcome === 'accepted') {
            installBtn.style.display = 'none';
            pwaStatus.innerHTML = "<b>Success!</b> Now close this browser and open the game from your home screen.";
          }
          deferredPrompt = null;
        } else {
          iosInstructions.style.display = 'block';
          installBtn.style.display = 'none';
        }
      }

      // Show overlay only if mobile and NOT standalone
      const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
      if (isMobile && !checkStandalone()) {
        overlay.style.display = 'flex';
      }

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }

      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
      });

      window.addEventListener('visibilitychange', () => {
        if (checkStandalone()) hidePWA();
      });
    </script>

    <div id="unity-container" class="unity-desktop">
      <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
      <div id="unity-loading-bar">
        <div id="unity-logo"></div>
        <div id="unity-progress-bar-empty">
          <div id="unity-progress-bar-full"></div>
        </div>
      </div>
      <div id="unity-warning"> </div>
      <div id="unity-footer">
        <div id="unity-webgl-logo"></div>
        <div id="unity-fullscreen-button"></div>
        <div id="unity-build-title">El Le3ba - The Game</div>
      </div>
    </div>
    <script>
      var container = document.querySelector("#unity-container");
      var canvas = document.querySelector("#unity-canvas");
      var loadingBar = document.querySelector("#unity-loading-bar");
      var progressBarFull = document.querySelector("#unity-progress-bar-full");
      var fullscreenButton = document.querySelector("#unity-fullscreen-button");
      var warningBanner = document.querySelector("#unity-warning");

      function unityShowBanner(msg, type) {
        function updateBannerVisibility() {
          warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
        }
        var div = document.createElement('div');
        div.innerHTML = msg;
        warningBanner.appendChild(div);
        if (type == 'error') div.style = 'background: red; padding: 10px;';
        else {
          if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
          setTimeout(function() {
            warningBanner.removeChild(div);
            updateBannerVisibility();
          }, 5000);
        }
        updateBannerVisibility();
      }

      var buildUrl = "Build";
      var loaderUrl = buildUrl + "/Build.loader.js";
      var config = {
        dataUrl: buildUrl + "/Build.data",
        frameworkUrl: buildUrl + "/Build.framework.js",
        codeUrl: buildUrl + "/Build.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "logic",
        productName: "El Le3ba - The Game",
        productVersion: "1.3",
        showBanner: unityShowBanner,
      };

      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
        container.className = "unity-mobile";
        canvas.className = "unity-mobile";
      } else {
        canvas.style.width = "960px";
        canvas.style.height = "600px";
      }

      loadingBar.style.display = "block";

      var script = document.createElement("script");
      script.src = loaderUrl;
      script.onload = () => {
        createUnityInstance(canvas, config, (progress) => {
          progressBarFull.style.width = 100 * progress + "%";
              }).then((unityInstance) => {
                loadingBar.style.display = "none";
                fullscreenButton.onclick = () => {
                  document.makeFullscreen('unity-container');
                };
              }).catch((message) => {
                alert(message);
              });
            };

      document.body.appendChild(script);

    </script>
  
    <div id='pwa-overlay'>
      <div class='pwa-content'>
        <div class='pwa-title'>El Le3ba</div>
        <button id='pwa-install-btn'>Add To Home Screen</button>
        <div id='pwa-ios-instructions'>1. Tap Share<br>2. Select Add to Home Screen</div>
        <div id='pwa-skip' style='margin-top:20px; cursor:pointer; color:gray;'>Continue in Browser</div>
      </div>
    </div>
    <script>
      let defPrompt;
      const overlay = document.getElementById('pwa-overlay');
      if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) overlay.style.display = 'none';
      if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
      window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); defPrompt = e; });
      document.getElementById('pwa-install-btn').addEventListener('click', async () => {
        if (defPrompt) { defPrompt.prompt(); overlay.style.display = 'none'; }
        else { document.getElementById('pwa-ios-instructions').style.display = 'block'; }
      });
      document.getElementById('pwa-skip').addEventListener('click', () => overlay.style.display = 'none');
    </script></body>
</html>
